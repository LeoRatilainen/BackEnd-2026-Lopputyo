<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Category List</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; background-color: #212529; color: #f8f9fa; 
        }
        .navbar {
            display: flex; justify-content: flex-end; align-items: center;
            padding: 15px 30px; background-color: #2c3034; border-bottom: 1px solid #454d55; gap: 20px;
        }
        .user-info { font-size: 14px; font-weight: bold; color: #adb5bd; }
        .content-padding { padding: 40px; }
        h1 { font-size: 2rem; color: #fff; margin-bottom: 20px; }
        
        table { width: 50%; border-collapse: collapse; margin-top: 20px; background-color: #2c3034; font-size: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #454d55; }
        th { background-color: #343a40; color: #198754; }
        
        .btn {
            display: inline-block; font-family: inherit; font-weight: bold; font-size: 14px;
            padding: 8px 16px; border-radius: 4px; text-decoration: none; color: white; border: none; cursor: pointer;
        }
        .btn-add { background-color: #198754; margin-bottom: 20px; }
        .btn-delete { background-color: #dc3545; }
        .btn-back { background-color: #6c757d; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="user-info">Logged in as: <span sec:authentication="name">User</span></span>
        <form th:action="@{/logout}" method="post">
            <input type="submit" value="Logout" class="btn btn-delete" />
        </form>
    </div>
    <div class="content-padding">
        <h1>Muscle Groups</h1>
        <a th:href="@{/addcategory}" class="btn btn-add">➕ Add New Category</a>
        <table>
            <thead>
                <tr><th>ID</th><th>Muscle Name</th></tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.musclegroupid}"></td>
                    <td th:text="${category.muscle}"></td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/index}" class="btn btn-back">⬅ Back to Home</a>
    </div>
</body>
</html>

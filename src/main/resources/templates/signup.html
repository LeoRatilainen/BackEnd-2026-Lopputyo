<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up</title>
    <style>
        body { font-family: sans-serif; background-color: #212529; color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-box { background-color: #2c3034; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 320px; }
        h2 { color: #198754; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #454d55; background-color: #343a40; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background-color: #198754; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .error { color: #dc3545; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="signup-box">
        <h2>Create Account</h2>
        <div th:if="${errormsg}" class="error" th:text="${errormsg}"></div>
        
        <form th:action="@{/saveuser}" th:object="${signupform}" method="post">
            <input type="text" th:field="*{username}" placeholder="Username" required />
            <input type="email" th:field="*{email}" placeholder="Email Address" required />
            <input type="password" th:field="*{passwordHash}" placeholder="Password" required />
            <button type="submit" class="btn">Register</button>
        </form>
        <a th:href="@{/login}" style="display: block; margin-top: 15px; color: #adb5bd; text-decoration: none; font-size: 14px;">Back to Login</a>
    </div>
</body>
</html>

<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Category</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
    body { font-family: sans-serif; background-color: #212529; color: #f8f9fa; padding: 40px; display: flex; justify-content: center; }
    .form-container { background-color: #2c3034; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 400px; }
    h1 { margin-top: 0; color: #198754; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; color: #adb5bd; }
    input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #454d55; background-color: #343a40; color: white; box-sizing: border-box; }
    
    .btn { 
        display: block; 
        width: 100%; 
        padding: 12px 0; 
        border-radius: 4px; 
        border: none; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 16px; 
        text-decoration: none; 
        text-align: center; 
        box-sizing: border-box; 
    }
    .btn-save { background-color: #198754; color: white; margin-top: 25px; }

    .btn-cancel { 
        background-color: #dc3545; 
        color: white; 
        margin-top: 10px; 
    }
    .btn-cancel:hover { background-color: #a71d2a; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>New Category</h1>
        <form th:action="@{/addcategory}" th:object="${category}" method="post">
            
            <label>Muscle Group Name</label>
            <input type="text" th:field="*{muscle}" placeholder="e.g. Triceps" required />

            <input type="submit" class="btn btn-save" value="Save Category" />
            <a th:href="@{/categorylist}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
</body>
</html>

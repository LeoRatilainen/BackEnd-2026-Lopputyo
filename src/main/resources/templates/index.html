<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${title}">Training App</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; background-color: #212529; color: #f8f9fa; 
        }
        .navbar {
            display: flex; justify-content: flex-end; align-items: center;
            padding: 15px 30px; background-color: #2c3034; border-bottom: 1px solid #454d55; gap: 20px;
        }
        .user-info { font-size: 14px; font-weight: bold; color: #adb5bd; }
        .main-content { text-align: center; margin-top: 60px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { color: #adb5bd; font-size: 1.1rem; }
        
        .btn {
            display: inline-block; font-family: inherit; font-weight: bold;
            text-decoration: none; border-radius: 6px; border: none; cursor: pointer; transition: transform 0.2s;
        }

        .btn-hero { padding: 15px 30px; font-size: 18px; width: 280px; color: white; background-color: #0d6efd; }
        .btn-hero:hover { background-color: #0b5ed7; transform: translateY(-2px); }
        .btn-category { background-color: #198754; }
        
        .btn-utility { padding: 8px 16px; font-size: 14px; color: white; background-color: #dc3545; }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="user-info">Logged in as: <span sec:authentication="name">User</span></span>
        <form th:action="@{/logout}" method="post">
            <input type="submit" value="Logout" class="btn btn-utility" />
        </form>
    </div>
    <div class="main-content">
        <h1 th:text="${title}">Training App</h1>
        <p>Select a dashboard to manage your fitness data</p>
        <div class="container">
            <a th:href="@{/traininglist}" class="btn btn-hero">Trainings</a>
            <a th:href="@{/categorylist}" class="btn btn-hero btn-category">Categories</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Training</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #212529; color: #f8f9fa; padding: 40px; }
        .form-container { background-color: #2c3034; padding: 30px; border-radius: 8px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #adb5bd; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #454d55; border-radius: 4px; background-color: #212529; color: white; box-sizing: border-box; }
        .btn-submit { background-color: #0d6efd; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-submit:hover { background-color: #0b5ed7; }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background-color: #212529;
            padding: 15px;
            border: 1px solid #454d55;
            border-radius: 4px;
            margin-top: 5px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin: 0 10px 0 0;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .checkbox-item label {
            margin-bottom: 0;
            font-weight: normal;
            cursor: pointer;
            color: #f8f9fa;
        }
    </style>
</head>
<body>
    <h1>Add New Training</h1>
    <div class="form-container">
        <form th:object="${training}" th:action="@{/addtraining}" action="#" method="post">
            <div class="form-group">
                <label for="workout">Workout Name:</label>
                <input type="text" id="workout" th:field="*{workout}" required />
            </div>
            
            <div class="form-group">
                <label for="reps">Reps:</label>
                <input type="number" id="reps" th:field="*{reps}" required />
            </div>
            
            <div class="form-group">
                <label for="sets">Sets:</label>
                <input type="number" id="sets" th:field="*{sets}" required />
            </div>
            
            <div class="form-group">
                <label for="rest">Rest (seconds):</label>
                <input type="number" id="rest" th:field="*{rest}" required />
            </div>
            
            <div class="form-group">
                <label>Categories (Select all that apply):</label>
                <div class="checkbox-grid">
                    <div class="checkbox-item" th:each="category : ${categories}">
                        <input type="checkbox" 
                               th:field="*{categories}" 
                               th:value="${category.musclegroupid}" 
                               th:id="${'cat-' + category.musclegroupid}" />
                        <label th:for="${'cat-' + category.musclegroupid}" 
                               th:text="${category.muscle}"></label>
                    </div>
                </div>
            </div>
            
            <input type="submit" value="Save Training" class="btn-submit" />
        </form>
    </div>
</body>
</html>

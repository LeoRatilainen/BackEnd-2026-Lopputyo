<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: sans-serif; background-color: #212529; color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #2c3034; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 320px; }
        h2 { color: #0d6efd; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #454d55; background-color: #343a40; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background-color: #0d6efd; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .error { color: #dc3545; margin-bottom: 10px; font-size: 14px; }
        .signup-link { display: block; margin-top: 15px; color: #adb5bd; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Training Login</h2>
        <div th:if="${param.error}" class="error">Invalid username or password.</div>
        <div th:if="${param.logout}" style="color: #198754; margin-bottom: 10px;">You have been logged out.</div>
        
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username" required autofocus />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit" class="btn">Login</button>
        </form>
        <a th:href="@{/signup}" class="signup-link">Don't have an account? Sign up here</a>
    </div>
</body>
</html>
